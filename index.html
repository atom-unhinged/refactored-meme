<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Optimizer</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #03050a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 500px;
    height: 580px;
  }

  /* Radial pulse behind figure */
  .pulse-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    width: 320px; height: 320px;
    border-radius: 50%;
    border: 1px solid rgba(0, 255, 180, 0.15);
    animation: pulseRing 3s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 1s; }
  .pulse-ring:nth-child(3) { animation-delay: 2s; }

  @keyframes pulseRing {
    0%   { transform: translate(-50%, -52%) scale(0.6); opacity: 0.6; }
    100% { transform: translate(-50%, -52%) scale(1.8); opacity: 0; }
  }

  svg {
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 18px rgba(0, 255, 180, 0.3));
  }

  /* Scan line overlay */
  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 10;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* Title */
  .title-block {
    text-align: center;
    margin-top: 12px;
    z-index: 5;
    position: relative;
  }

  .title-block h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2.2rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #00ffb4;
    text-shadow: 0 0 20px rgba(0,255,180,0.6), 0 0 40px rgba(0,255,180,0.2);
    animation: flicker 6s infinite;
  }

  .title-block p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: rgba(0, 255, 180, 0.4);
    margin-top: 4px;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.5; }
    99% { opacity: 1; }
  }

  /* SVG animation definitions */
  .eye-glow { animation: eyePulse 2.5s ease-in-out infinite; }
  @keyframes eyePulse {
    0%, 100% { filter: drop-shadow(0 0 3px #00ffb4); opacity: 0.9; }
    50%       { filter: drop-shadow(0 0 10px #00ffb4) drop-shadow(0 0 20px #00ff88); opacity: 1; }
  }

  .node { animation: nodePulse 2s ease-in-out infinite; }
  .node:nth-child(odd)  { animation-delay: 0.3s; }
  .node:nth-child(even) { animation-delay: 0.9s; }
  @keyframes nodePulse {
    0%, 100% { opacity: 0.4; r: 3; }
    50%       { opacity: 1;   r: 5; }
  }

  .data-line { animation: dataFlow 2s linear infinite; }
  .data-line:nth-child(2) { animation-delay: 0.4s; }
  .data-line:nth-child(3) { animation-delay: 0.8s; }
  .data-line:nth-child(4) { animation-delay: 1.2s; }
  .data-line:nth-child(5) { animation-delay: 1.6s; }
  @keyframes dataFlow {
    0%   { stroke-dashoffset: 200; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  .orbit-ring { animation: orbit 8s linear infinite; transform-origin: 250px 210px; }
  .orbit-ring-2 { animation: orbit 12s linear infinite reverse; transform-origin: 250px 210px; }
  @keyframes orbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .brain-pulse { animation: brainGlow 3s ease-in-out infinite; }
  @keyframes brainGlow {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; filter: drop-shadow(0 0 6px #00ffb4); }
  }

  .signal {
    animation: signalTravel 3s ease-in-out infinite;
  }
  .signal:nth-child(2) { animation-delay: 1s; }
  .signal:nth-child(3) { animation-delay: 2s; }
  @keyframes signalTravel {
    0%   { opacity: 0; transform: scale(0.5); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: scale(1.5); }
  }

  .grid-line { animation: gridFade 4s ease-in-out infinite; }
  @keyframes gridFade {
    0%, 100% { opacity: 0.07; }
    50%       { opacity: 0.18; }
  }

  .crown-ray { animation: crownPulse 2s ease-in-out infinite; transform-origin: 250px 80px; }
  .crown-ray:nth-child(2) { animation-delay: 0.2s; }
  .crown-ray:nth-child(3) { animation-delay: 0.4s; }
  .crown-ray:nth-child(4) { animation-delay: 0.6s; }
  .crown-ray:nth-child(5) { animation-delay: 0.8s; }
  @keyframes crownPulse {
    0%, 100% { opacity: 0.3; stroke-width: 1; }
    50%       { opacity: 0.9; stroke-width: 1.5; }
  }
</style>
</head>
